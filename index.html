<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF--8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diario de Trading Visual IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --cyan: #64f4ec; /* More of a teal */
        --magenta: #f4b464; /* A gold/orange accent */
        --background-dark: #0f172a; /* Dark slate blue */
        --panel-bg: rgba(21, 29, 49, 0.6);
        --border-color: rgba(100, 244, 236, 0.2);
        --text-primary: #e2e8f0; /* Light gray */
        --text-secondary: #94a3b8; /* Muted gray */
      }

      body {
        background-color: var(--background-dark);
        background-image:
          linear-gradient(rgba(100, 244, 236, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(100, 244, 236, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        font-family: 'Poppins', sans-serif;
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
      }

      #root {
        height: 100%;
      }
      
      .futuristic-panel {
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(100, 244, 236, 0.05);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        position: relative;
        padding: 1.5rem; /* 24px */
        border-radius: 8px;
      }

      .text-glow-cyan {
        color: var(--cyan);
        text-shadow: 0 0 8px rgba(100, 244, 236, 0.7);
      }
      
      .text-glow-magenta {
        color: var(--magenta);
        text-shadow: 0 0 8px rgba(244, 180, 100, 0.7);
      }

      .futuristic-button {
        background-color: transparent;
        border: 1px solid var(--cyan);
        color: var(--cyan);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .futuristic-button:hover, .futuristic-button.active {
        background-color: rgba(100, 244, 236, 0.2);
        box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
        color: white;
      }
      .futuristic-button.disabled, .futuristic-button:disabled {
        border-color: #4b5563;
        color: #4b5563;
        cursor: not-allowed;
        background-color: transparent;
        box-shadow: none;
      }
      
      .futuristic-button-red {
        border-color: #ef4444;
        color: #ef4444;
      }
      .futuristic-button-red:hover, .futuristic-button-red.active {
        background-color: rgba(239, 68, 68, 0.2);
        box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
        color: white;
      }

      .futuristic-input {
        background: rgba(100, 244, 236, 0.05);
        border: 1px solid rgba(100, 244, 236, 0.3);
        color: white;
      }
      .futuristic-input:focus {
         outline: none;
         border-color: var(--cyan);
         box-shadow: 0 0 10px var(--cyan);
      }
      
      /* Scrollbar styles */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(100, 244, 236, 0.05);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(100, 244, 236, 0.3);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--cyan);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              cyan: 'var(--cyan)',
              magenta: 'var(--magenta)',
              'background-dark': 'var(--background-dark)',
              'panel-bg': 'var(--panel-bg)',
              'text-primary': 'var(--text-primary)',
              'text-secondary': 'var(--text-secondary)',
            }
          }
        }
      }
    </script>

{

}
